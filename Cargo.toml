[package]
name = "kinect-one"
version = "0.1.0"
edition = "2021"

[dependencies]
thiserror = "2.0.17"

nusb = { git = "https://github.com/Aytixel/nusb.git", branch = "main" }

zune-jpeg = { version = "0.5.0", optional = true }
mozjpeg = { version = "0.10.13", optional = true }
turbojpeg = { version = "1.3.3", optional = true }

ocl = { version = "0.19.7", optional = true }

tokio = { version = "1.47.1", features = ["rt-multi-thread", "macros", "time"] }
env_logger = "0.11.8"

[features]
default = [
    "zune_rgb",
    "moz_rgb",
    "turbo_rgb",
    "cpu_depth",
    "opencl_depth",
    "opencl_kde_depth",
]

zune_rgb = ["dep:zune-jpeg"]
moz_rgb = ["dep:mozjpeg"]
turbo_rgb = ["dep:turbojpeg"]

cpu_depth = []
opencl_depth = ["dep:ocl"]
opencl_kde_depth = ["dep:ocl"]
